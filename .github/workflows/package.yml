name: Pack alas-launcher

on:
  push:
    tags:
      - '*'
  workflow_dispatch: {}

env:
  UV_MANAGED_PYTHON: 1
  UV_PYTHON_INSTALL_DIR: ${{ github.workspace }}/python
  UV_PYTHON: 3.14.3

jobs:
  package:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Install Tauri dependencies (Ubuntu only)
        if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Get rdfind
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: sudo apt-get install -y rdfind
          macos: brew install rdfind
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Prepare bootstrap uv
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: |
            mkdir -p bootstrap
            cp "$(command -v uv)" bootstrap/uv
            echo "ALAS_BOOTSTRAP_UV=$PWD/bootstrap/uv" >> "$GITHUB_ENV"
          macos: |
            mkdir -p bootstrap
            cp "$(command -v uv)" bootstrap/uv
            echo "ALAS_BOOTSTRAP_UV=$PWD/bootstrap/uv" >> "$GITHUB_ENV"
          windows: |
            mkdir -ea 0 bootstrap
            cp (Get-Command uv).Source bootstrap\uv.exe
            "ALAS_BOOTSTRAP_UV=$PWD\bootstrap\uv.exe" >> $env:GITHUB_ENV
      - name: Rustup for cache
        run: rustup toolchain install stable --profile minimal
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose --release
      - name: Get git
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: |
            git clone https://github.com/git/git.git --branch v2.49.1 --depth 1
            cd git
            echo NO_GETTEXT=1 > config.mak
            cat > conanfile.txt <<CONANFILE
            [requires]
            openssl/3.4.1
            libcurl/8.12.1
            expat/2.7.1
            pcre2/10.44
            [generators]
            AutotoolsDeps
            AutotoolsToolchain
            PkgConfigDeps
            CONANFILE
            container_id=$(docker run -d -v $PWD:/volume --rm -t quay.io/pypa/manylinux2010_x86_64:latest)
            docker exec -w /volume -t $container_id yum update
            docker exec -w /volume -t $container_id yum install -y gettext perl-IPC-Cmd perl-Digest-SHA
            docker exec -w /volume -t $container_id pipx install conan
            docker exec -w /volume -t $container_id conan profile detect --force
            docker exec -w /volume -t $container_id conan install . --build=missing --build="m4*"
            docker exec -w /volume -t $container_id make configure
            docker exec -w /volume -t $container_id bash -c 'source conanbuild.sh; \
              export RUNTIME_PREFIX=1
              export CURL_CONFIG="pkg-config libcurl"
              LDFLAGS+=" $LIBS"
              export LDFLAGS
              ./configure --with-openssl --with-curl --with-expat --without-tcltk --prefix=/; \
              make -j$(nproc) RUNTIME_PREFIX=1 CURL_CONFIG="$CURL_CONFIG" install DESTDIR=/volume/dist'
            sudo chown -R $USER:$USER .
          macos: |
            brew install autoconf
            git clone https://github.com/git/git.git --branch v2.49.1 --depth 1
            cd git
            echo NO_GETTEXT=1 > config.mak
            make configure
            ./configure --with-openssl --with-curl --with-expat --without-tcltk --prefix=/
            make -j$(sysctl -n hw.logicalcpu) RUNTIME_PREFIX=1 install DESTDIR=$PWD/dist
          windows: |
            curl -L -O https://github.com/brechtsanders/pedeps/releases/download/0.1.15/pedeps-0.1.15-win64.zip
            mkdir -p pedeps
            unzip pedeps-0.1.15-win64.zip -d pedeps/
            curl -L -O https://github.com/git-for-windows/git/releases/download/v2.51.0.windows.2/MinGit-2.51.0.2-busybox-64-bit.zip
            mkdir git
            cd git
            tar -xvf ..\MinGit-2.51.0.2-busybox-64-bit.zip
      - name: Get adb
        uses: knicknic/os-specific-run@v1.0.3
        with:
          macos: |
            curl -L -o adb.zip https://dl.google.com/android/repository/platform-tools-latest-darwin.zip
            unzip adb.zip
          linux: |
            curl -L -o adb.zip https://dl.google.com/android/repository/platform-tools-latest-linux.zip
            unzip adb.zip
          windows: |
            curl -L -o adb.zip https://dl.google.com/android/repository/platform-tools-latest-windows.zip
            tar -xvf adb.zip
      - name: Get ALAS
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/wess09/AzurPilot.git AzurLaneAutoScript
          git -C AzurLaneAutoScript sparse-checkout set deploy
      - name: Distribute
        uses: knicknic/os-specific-run@v1.0.3
        with:
          macos: |
            set -eux
            rm -rf package-root AzurLaneAutoScript.app
            mkdir -p package-root/AzurLaneAutoScript
            ditto AzurLaneAutoScript/deploy package-root/AzurLaneAutoScript/deploy

            cd package-root/AzurLaneAutoScript
            mkdir -p config .venv/bin bootstrap
            cp ../../deploy.mac.yaml config/deploy.yaml
            export UV_PYTHON_INSTALL_DIR="$PWD/.venv/python"
            uv python install --install-dir .venv/python --no-bin --managed-python 3.14.3
            python_home="$(find .venv/python -maxdepth 1 -type d -name 'cpython-3.14.3-*' | head -n1)"
            uv venv --allow-existing --relocatable --python "$python_home/bin/python3.14" .venv
            uv pip install --python .venv/bin/python requests
            cp ../../bootstrap/uv .venv/bin/uv
            cp ../../platform-tools/adb .venv/bin/adb
            mkdir -p .venv/libexec
            cp -R ../../git/dist/libexec/git-core .venv/libexec/
            mkdir -p .venv/share/git-core
            cp -R ../../git/dist/share/git-core/templates .venv/share/git-core/
            cp ../../git/dist/bin/git .venv/bin/git
            cp .venv/bin/adb bootstrap/adb
            cp -R .venv/libexec/git-core bootstrap/
            cp -R .venv/share/git-core/templates bootstrap/git-templates
            cp .venv/bin/git bootstrap/git
            chmod +x .venv/bin/uv .venv/bin/adb .venv/bin/git
            .venv/bin/python -c 'import sys; print(sys.version)'
            .venv/bin/uv --version
            .venv/bin/adb version
            .venv/bin/git --version
            GIT_EXEC_PATH="$PWD/.venv/libexec/git-core" GIT_TEMPLATE_DIR="$PWD/.venv/share/git-core/templates" .venv/bin/git init git-smoke
            GIT_EXEC_PATH="$PWD/.venv/libexec/git-core" GIT_TEMPLATE_DIR="$PWD/.venv/share/git-core/templates" .venv/bin/git ls-remote https://github.com/git/git.git HEAD

            cd ${{ github.workspace }}
            mkdir -p AzurLaneAutoScript.app/Contents/MacOS
            cp target/release/alas-launcher AzurLaneAutoScript.app/Contents/MacOS/
            mkdir -p AzurLaneAutoScript.app/Contents/Resources
            cp icons/icon.icns AzurLaneAutoScript.app/Contents/Resources/
            ditto package-root/AzurLaneAutoScript AzurLaneAutoScript.app/Contents/AzurLaneAutoScript
            cp Info.plist AzurLaneAutoScript.app/Contents/
            rdfind -minsize 128 -makehardlinks true AzurLaneAutoScript.app
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('AzurLaneAutoScript-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('AzurLaneAutoScript.app')
            EOF

            cp deploy.mac-cn.yaml AzurLaneAutoScript.app/Contents/AzurLaneAutoScript/config/deploy.yaml
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('AzurLaneAutoScript-CN-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('AzurLaneAutoScript.app')
            EOF
          linux: |
            set -eux
            rm -rf package-root
            mkdir -p package-root/AzurLaneAutoScript
            cp -a AzurLaneAutoScript/deploy package-root/AzurLaneAutoScript/deploy

            cd package-root/AzurLaneAutoScript
            mkdir -p config .venv/bin bootstrap
            cp ../../deploy.unix.yaml config/deploy.yaml
            export UV_PYTHON_INSTALL_DIR="$PWD/.venv/python"
            uv python install --install-dir .venv/python --no-bin --managed-python 3.14.3
            python_home="$(find .venv/python -maxdepth 1 -type d -name 'cpython-3.14.3-*' | head -n1)"
            uv venv --allow-existing --relocatable --python "$python_home/bin/python3.14" .venv
            uv pip install --python .venv/bin/python requests
            cp ../../bootstrap/uv .venv/bin/uv
            cp ../../platform-tools/adb .venv/bin/adb
            mkdir -p .venv/libexec
            cp -R ../../git/dist/libexec/git-core .venv/libexec/
            mkdir -p .venv/share/git-core
            cp -R ../../git/dist/share/git-core/templates .venv/share/git-core/
            cp ../../git/dist/bin/git .venv/bin/git
            cp .venv/bin/adb bootstrap/adb
            cp -R .venv/libexec/git-core bootstrap/
            cp -R .venv/share/git-core/templates bootstrap/git-templates
            cp .venv/bin/git bootstrap/git
            chmod +x .venv/bin/uv .venv/bin/adb .venv/bin/git
            cp ../../target/release/alas-launcher alas-launcher
            .venv/bin/python -c 'import sys; print(sys.version)'
            .venv/bin/uv --version
            .venv/bin/adb version
            .venv/bin/git --version
            GIT_EXEC_PATH="$PWD/.venv/libexec/git-core" GIT_TEMPLATE_DIR="$PWD/.venv/share/git-core/templates" .venv/bin/git init git-smoke
            GIT_EXEC_PATH="$PWD/.venv/libexec/git-core" GIT_TEMPLATE_DIR="$PWD/.venv/share/git-core/templates" .venv/bin/git ls-remote https://github.com/git/git.git HEAD

            cd ${{ github.workspace }}
            rdfind -minsize 128 -makehardlinks true package-root/AzurLaneAutoScript
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('AzurLaneAutoScript-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('package-root/AzurLaneAutoScript', arcname='AzurLaneAutoScript')
            EOF

            cp deploy.unix-cn.yaml package-root/AzurLaneAutoScript/config/deploy.yaml
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('AzurLaneAutoScript-CN-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('package-root/AzurLaneAutoScript', arcname='AzurLaneAutoScript')
            EOF
          windows: |
            rm -r -fo package-root -ErrorAction SilentlyContinue
            mkdir -ea 0 package-root\AzurLaneAutoScript
            cp -r AzurLaneAutoScript\deploy package-root\AzurLaneAutoScript\deploy

            cd package-root\AzurLaneAutoScript
            mkdir -ea 0 config
            mkdir -ea 0 bootstrap
            cp ..\..\deploy.windows.yaml config\deploy.yaml
            $env:UV_PYTHON_INSTALL_DIR = "$PWD\.venv\python"
            uv python install --install-dir .venv\python --no-bin --managed-python 3.14.3
            $python_home = Get-ChildItem .venv\python -Directory | Where-Object { $_.Name -like "cpython-3.14.3-*" } | Select-Object -First 1
            uv venv --allow-existing --relocatable --python "$($python_home.FullName)\python.exe" .venv
            uv pip install --python .venv\Scripts\python.exe requests
            cp ..\..\bootstrap\uv.exe .venv\Scripts\uv.exe
            cp ..\..\platform-tools\adb.exe .venv\Scripts\adb.exe
            cp ..\..\platform-tools\Adb*.dll .venv\Scripts\
            mkdir -ea 0 .venv\Scripts\git\cmd
            cp ..\..\git\cmd\git.exe .venv\Scripts\git\cmd\
            mkdir -ea 0 .venv\Scripts\git\mingw64\bin
            $git_files = @("git.exe","git-remote-http.exe","git-remote-https.exe","libcurl-4.dll") | ForEach-Object { "..\..\git\mingw64\bin\" + $_ }
            ..\..\pedeps\bin\copypedeps.exe -r $git_files .venv\Scripts\git\mingw64\bin\
            cp .venv\Scripts\adb.exe bootstrap\adb.exe
            cp .venv\Scripts\Adb*.dll bootstrap\
            mkdir -ea 0 bootstrap\git
            cp -r .venv\Scripts\git\* bootstrap\git\
            cp ..\..\target\release\alas-launcher.exe alas-launcher.exe
            .venv\Scripts\python.exe -c "import sys; print(sys.version)"
            .venv\Scripts\uv.exe --version
            .venv\Scripts\adb.exe version
            .venv\Scripts\git\cmd\git.exe --version

            cd ${{ github.workspace }}
            uv run python -c @"
            import tarfile, lzma
            with tarfile.open('AzurLaneAutoScript-${{ runner.os }}-$($env:PROCESSOR_ARCHITECTURE.ToLower()).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('package-root/AzurLaneAutoScript', arcname='AzurLaneAutoScript')
            "@

            cp deploy.windows-cn.yaml package-root\AzurLaneAutoScript\config\deploy.yaml
            uv run python -c @"
            import tarfile, lzma
            with tarfile.open('AzurLaneAutoScript-CN-${{ runner.os }}-$($env:PROCESSOR_ARCHITECTURE.ToLower()).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('package-root/AzurLaneAutoScript', arcname='AzurLaneAutoScript')
            "@
      - name: Prepare launcher updater payload
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: |
            arch=$(uname -m)
            case "$arch" in
              x86_64) arch_key="x86_64" ;;
              aarch64|arm64) arch_key="aarch64" ;;
              i686|i386) arch_key="i686" ;;
              armv7l) arch_key="armv7" ;;
              *) echo "Unsupported architecture: $arch"; exit 1 ;;
            esac
            mkdir -p launcher-updater
            cp target/release/alas-launcher "launcher-updater/alas-launcher-linux-$arch_key"
          macos: |
            arch=$(uname -m)
            case "$arch" in
              x86_64) arch_key="x86_64" ;;
              aarch64|arm64) arch_key="aarch64" ;;
              *) echo "Unsupported architecture: $arch"; exit 1 ;;
            esac
            mkdir -p launcher-updater
            cp target/release/alas-launcher "launcher-updater/alas-launcher-darwin-$arch_key"
          windows: |
            $arch = $env:PROCESSOR_ARCHITECTURE.ToLower()
            if ($arch -eq "amd64") { $arch = "x86_64" }
            elseif ($arch -eq "x86") { $arch = "i686" }
            elseif ($arch -eq "arm64") { $arch = "aarch64" }
            mkdir -ea 0 launcher-updater
            cp target\release\alas-launcher.exe ("launcher-updater\\alas-launcher-windows-" + $arch + ".exe")
      - name: Upload launcher updater payload
        uses: actions/upload-artifact@v4
        with:
          name: launcher-updater-${{ matrix.os }}
          path: launcher-updater/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AzurLaneAutoScript-${{ matrix.os }}
          path: |
            AzurLaneAutoScript-${{ runner.os }}-*
      - name: Upload artifacts (CN)
        uses: actions/upload-artifact@v4
        with:
          name: AzurLaneAutoScript-CN-${{ matrix.os }}
          path: |
            AzurLaneAutoScript-CN-${{ runner.os }}-*
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          prerelease: true
          files: |
            AzurLaneAutoScript-${{ runner.os }}-*
            AzurLaneAutoScript-CN-${{ runner.os }}-*

  deploy-launcher-update:
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    env:
      UPDATE_BASE_URL: https://alas.nanoda.work/updata
    steps:
      - name: Download launcher updater payloads
        uses: actions/download-artifact@v4
        with:
          pattern: launcher-updater-*
          merge-multiple: true
          path: launcher-updater
      - name: Build stable.json
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import datetime
          import hashlib
          import json
          import os
          from pathlib import Path

          base_url = os.environ["UPDATE_BASE_URL"].rstrip("/")
          version = os.environ["VERSION"].strip()
          if version.startswith("v"):
              version = version[1:]

          root = Path("launcher-updater")
          files = sorted(
              p for p in root.glob("alas-launcher-*")
              if p.is_file() and p.name != "stable.json"
          )
          if not files:
              raise SystemExit("No launcher payloads found in launcher-updater/")

          platforms = {}
          for file_path in files:
              name = file_path.name
              key = name[len("alas-launcher-"):]
              if key.endswith(".exe"):
                  key = key[:-4]
              url_name = name
              if name.startswith("alas-launcher-windows-") and name.endswith(".exe"):
                  url_name = "alas-launcher.exe"
              digest = hashlib.sha256(file_path.read_bytes()).hexdigest()
              platforms[key] = {
                  "url": f"{base_url}/{url_name}",
                  "sha256": digest,
              }

          manifest = {
              "version": version,
              "pub_date": datetime.datetime.now(datetime.timezone.utc).isoformat().replace("+00:00", "Z"),
              "notes": f"Launcher auto update {version}",
              "platforms": platforms,
          }
          (root / "stable.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Trust deployment host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Upload updater files to OpenResty path
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: /opt/1panel/www/sites/alas.nanoda.work/index/updata
        run: |
          set -eu
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          INCOMING="${DEPLOY_PATH}/.incoming-${GITHUB_RUN_ID}"
          ssh -p "${DEPLOY_PORT}" "${REMOTE}" "mkdir -p '${DEPLOY_PATH}' '${INCOMING}'"
          for file in launcher-updater/alas-launcher-*; do
            [ -f "${file}" ] || continue
            filename="$(basename "${file}")"
            remote_name="${filename}"
            if [[ "${filename}" == alas-launcher-windows-*.exe ]]; then
              remote_name="alas-launcher.exe"
            fi
            scp -P "${DEPLOY_PORT}" "${file}" "${REMOTE}:${INCOMING}/${remote_name}"
          done
          scp -P "${DEPLOY_PORT}" launcher-updater/stable.json "${REMOTE}:${INCOMING}/stable.json"
          ssh -p "${DEPLOY_PORT}" "${REMOTE}" "set -eu
            find '${INCOMING}' -maxdepth 1 -type f ! -name 'stable.json' -exec mv -f {} '${DEPLOY_PATH}/' \;
            mv -f '${INCOMING}/stable.json' '${DEPLOY_PATH}/stable.json'
            rm -rf '${INCOMING}'
          "
