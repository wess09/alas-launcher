name: Pack AzurPilot

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to build when not running from a tag. Leave empty to use Cargo.toml.
        required: false
        type: string

env:
  UV_MANAGED_PYTHON: 1
  UV_PYTHON_INSTALL_DIR: ${{ github.workspace }}/python
  UV_PYTHON: 3.14.3

jobs:
  package:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest, windows-11-arm]

    steps:
      - name: Install Tauri dependencies (Ubuntu only)
        if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Get rdfind
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: sudo apt-get install -y rdfind
          macos: brew install rdfind
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Prepare version from tag or input
        shell: python
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          import os
          import re
          from pathlib import Path

          cargo_path = Path("Cargo.toml")
          tauri_path = Path("tauri.conf.json")
          info_plist_path = Path("Info.plist")
          cargo_lock_path = Path("Cargo.lock")

          cargo_text = cargo_path.read_text(encoding="utf-8")
          current_version_match = re.search(r'(?m)^version = "([^"]+)"', cargo_text)
          if not current_version_match:
              raise SystemExit("Unable to read current version from Cargo.toml")
          current_version = current_version_match.group(1)

          ref_type = os.environ.get("REF_TYPE", "")
          ref_name = os.environ.get("REF_NAME", "").strip()
          input_version = os.environ.get("INPUT_VERSION", "").strip()
          version = ref_name if ref_type == "tag" else input_version or current_version

          semver_pattern = re.compile(
              r"^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)"
              r"(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?"
              r"(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$"
          )
          if not semver_pattern.fullmatch(version):
              raise SystemExit(
                  f"Version '{version}' is not valid SemVer for Cargo/Tauri. "
                  "Use a tag such as '2.0.6' instead of 'v2.0.6'."
              )

          def replace_once(path: Path, pattern: str, replacement: str) -> None:
              text = path.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.MULTILINE)
              if count != 1:
                  raise SystemExit(f"Unable to update version in {path}")
              path.write_text(updated, encoding="utf-8")

          replace_once(cargo_path, r'(?m)^version = "[^"]+"', f'version = "{version}"')

          import json

          tauri = json.loads(tauri_path.read_text(encoding="utf-8"))
          tauri["version"] = version
          tauri_path.write_text(json.dumps(tauri, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          for key_name in ("CFBundleShortVersionString", "CFBundleVersion"):
              info_text = info_plist_path.read_text(encoding="utf-8")
              info_text, count = re.subn(
                  rf"(<key>{re.escape(key_name)}</key>\s*<string>)[^<]+(</string>)",
                  rf"\g<1>{version}\2",
                  info_text,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f"Info.plist is missing {key_name}")
              info_plist_path.write_text(info_text, encoding="utf-8")

          lock_text = cargo_lock_path.read_text(encoding="utf-8")
          lock_updated, count = re.subn(
              r'(?ms)(\[\[package\]\]\s+name = "alas-launcher"\s+version = ")[^"]+(")',
              rf"\g<1>{version}\2",
              lock_text,
              count=1,
          )
          if count == 1:
              cargo_lock_path.write_text(lock_updated, encoding="utf-8")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"PACKAGE_VERSION={version}\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
          print(f"Building version {version}")
      - name: Prepare bootstrap uv
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: |
            mkdir -p bootstrap
            cp "$(command -v uv)" bootstrap/uv
            echo "ALAS_BOOTSTRAP_UV=$PWD/bootstrap/uv" >> "$GITHUB_ENV"
          macos: |
            mkdir -p bootstrap
            cp "$(command -v uv)" bootstrap/uv
            echo "ALAS_BOOTSTRAP_UV=$PWD/bootstrap/uv" >> "$GITHUB_ENV"
          windows: |
            mkdir -ea 0 bootstrap
            cp (Get-Command uv).Source bootstrap\uv.exe
            "ALAS_BOOTSTRAP_UV=$PWD\bootstrap\uv.exe" >> $env:GITHUB_ENV
      - name: Rustup for cache
        run: rustup toolchain install stable --profile minimal
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        env:
          ALAS_LAUNCHER_MTLS_IDENTITY_PEM_B64: ${{ secrets.ALAS_LAUNCHER_MTLS_IDENTITY_PEM_B64 }}
          REQUIRE_LAUNCHER_MTLS_IDENTITY: "1"
          LAUNCHER_UPDATE_URL: ${{ secrets.LAUNCHER_NEW_UPDATE_URL }}
        run: cargo build --verbose --release
      - name: Get git
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: |
            git clone https://github.com/git/git.git --branch v2.49.1 --depth 1
            cd git
            echo NO_GETTEXT=1 > config.mak
            cat > conanfile.txt <<CONANFILE
            [requires]
            openssl/3.4.1
            libcurl/8.12.1
            expat/2.7.1
            pcre2/10.44
            [generators]
            AutotoolsDeps
            AutotoolsToolchain
            PkgConfigDeps
            CONANFILE
            container_id=$(docker run -d -v $PWD:/volume --rm -t quay.io/pypa/manylinux2010_x86_64:latest)
            docker exec -w /volume -t $container_id yum update
            docker exec -w /volume -t $container_id yum install -y gettext perl-IPC-Cmd perl-Digest-SHA
            docker exec -w /volume -t $container_id pipx install conan
            docker exec -w /volume -t $container_id conan profile detect --force
            docker exec -w /volume -t $container_id conan install . --build=missing --build="m4*"
            docker exec -w /volume -t $container_id make configure
            docker exec -w /volume -t $container_id bash -c 'source conanbuild.sh; \
              export RUNTIME_PREFIX=1
              export CURL_CONFIG="pkg-config libcurl"
              LDFLAGS+=" $LIBS"
              export LDFLAGS
              ./configure --with-openssl --with-curl --with-expat --without-tcltk --prefix=/; \
              make -j$(nproc) RUNTIME_PREFIX=1 CURL_CONFIG="$CURL_CONFIG" install DESTDIR=/volume/dist'
            sudo chown -R $USER:$USER .
          macos: |
            brew install autoconf
            git clone https://github.com/git/git.git --branch v2.49.1 --depth 1
            cd git
            echo NO_GETTEXT=1 > config.mak
            make configure
            ./configure --with-openssl --with-curl --with-expat --without-tcltk --prefix=/
            make -j$(sysctl -n hw.logicalcpu) RUNTIME_PREFIX=1 install DESTDIR=$PWD/dist
          windows: |
            curl -L -O https://github.com/brechtsanders/pedeps/releases/download/0.1.15/pedeps-0.1.15-win64.zip
            mkdir -p pedeps
            unzip pedeps-0.1.15-win64.zip -d pedeps/
            curl -L -O https://github.com/git-for-windows/git/releases/download/v2.51.0.windows.2/MinGit-2.51.0.2-busybox-64-bit.zip
            mkdir git
            cd git
            tar -xvf ..\MinGit-2.51.0.2-busybox-64-bit.zip
      - name: Get adb
        uses: knicknic/os-specific-run@v1.0.3
        with:
          macos: |
            curl -L -o adb.zip https://dl.google.com/android/repository/platform-tools-latest-darwin.zip
            unzip adb.zip
          linux: |
            curl -L -o adb.zip https://dl.google.com/android/repository/platform-tools-latest-linux.zip
            unzip adb.zip
          windows: |
            curl -L -o adb.zip https://dl.google.com/android/repository/platform-tools-latest-windows.zip
            tar -xvf adb.zip
      - name: Get AzurPilot
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/wess09/AzurPilot.git AzurLaneAutoScript
          git -C AzurLaneAutoScript sparse-checkout set deploy
      - name: Distribute
        uses: knicknic/os-specific-run@v1.0.3
        with:
          macos: |
            set -eux
            rm -rf package-root AzurPilot.app
            mkdir -p package-root/AzurLaneAutoScript
            ditto AzurLaneAutoScript/deploy package-root/AzurLaneAutoScript/deploy

            cd package-root/AzurLaneAutoScript
            mkdir -p config .venv/bin bootstrap
            cp ../../deploy.mac.yaml config/deploy.yaml
            export UV_PYTHON_INSTALL_DIR="$PWD/.venv/python"
            uv python install --install-dir .venv/python --no-bin --managed-python 3.14.3
            python_home="$(find .venv/python -maxdepth 1 -type d -name 'cpython-3.14.3-*' | head -n1)"
            uv venv --allow-existing --relocatable --python "$python_home/bin/python3.14" .venv
            uv pip install --python .venv/bin/python requests
            cp ../../bootstrap/uv .venv/bin/uv
            cp ../../platform-tools/adb .venv/bin/adb
            mkdir -p .venv/libexec
            cp -R ../../git/dist/libexec/git-core .venv/libexec/
            mkdir -p .venv/share/git-core
            cp -R ../../git/dist/share/git-core/templates .venv/share/git-core/
            cp ../../git/dist/bin/git .venv/bin/git
            test -x .venv/libexec/git-core/git-remote-https
            cp .venv/bin/adb bootstrap/adb
            cp -R .venv/libexec/git-core bootstrap/
            cp -R .venv/share/git-core/templates bootstrap/git-templates
            cp .venv/bin/git bootstrap/git
            chmod +x .venv/bin/uv .venv/bin/adb .venv/bin/git
            .venv/bin/python -c 'import sys; print(sys.version)'
            .venv/bin/uv --version
            .venv/bin/adb version
            .venv/bin/git --version
            GIT_EXEC_PATH="$PWD/.venv/libexec/git-core" GIT_TEMPLATE_DIR="$PWD/.venv/share/git-core/templates" .venv/bin/git init git-smoke
            GIT_EXEC_PATH="$PWD/.venv/libexec/git-core" GIT_TEMPLATE_DIR="$PWD/.venv/share/git-core/templates" .venv/bin/git ls-remote https://github.com/git/git.git HEAD

            cd ${{ github.workspace }}
            mkdir -p AzurPilot.app/Contents/MacOS
            cp target/release/alas-launcher AzurPilot.app/Contents/MacOS/
            mkdir -p AzurPilot.app/Contents/Resources
            cp icons/icon.icns AzurPilot.app/Contents/Resources/
            ditto package-root/AzurLaneAutoScript AzurPilot.app/Contents/AzurLaneAutoScript
            cp Info.plist AzurPilot.app/Contents/
            rdfind -minsize 128 -makehardlinks true AzurPilot.app
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('AP-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('AzurPilot.app')
            EOF

            cp deploy.mac-cn.yaml AzurPilot.app/Contents/AzurLaneAutoScript/config/deploy.yaml
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('AP-CN-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('AzurPilot.app')
            EOF
          linux: |
            set -eux
            rm -rf package-root
            mkdir -p package-root/AzurLaneAutoScript
            cp -a AzurLaneAutoScript/deploy package-root/AzurLaneAutoScript/deploy

            cd package-root/AzurLaneAutoScript
            mkdir -p config .venv/bin bootstrap
            cp ../../deploy.unix.yaml config/deploy.yaml
            export UV_PYTHON_INSTALL_DIR="$PWD/.venv/python"
            uv python install --install-dir .venv/python --no-bin --managed-python 3.14.3
            python_home="$(find .venv/python -maxdepth 1 -type d -name 'cpython-3.14.3-*' | head -n1)"
            uv venv --allow-existing --relocatable --python "$python_home/bin/python3.14" .venv
            uv pip install --python .venv/bin/python requests
            cp ../../bootstrap/uv .venv/bin/uv
            cp ../../platform-tools/adb .venv/bin/adb
            mkdir -p .venv/libexec
            cp -R ../../git/dist/libexec/git-core .venv/libexec/
            mkdir -p .venv/share/git-core
            cp -R ../../git/dist/share/git-core/templates .venv/share/git-core/
            cp ../../git/dist/bin/git .venv/bin/git
            test -x .venv/libexec/git-core/git-remote-https
            cp .venv/bin/adb bootstrap/adb
            cp -R .venv/libexec/git-core bootstrap/
            cp -R .venv/share/git-core/templates bootstrap/git-templates
            cp .venv/bin/git bootstrap/git
            chmod +x .venv/bin/uv .venv/bin/adb .venv/bin/git
            cp ../../target/release/alas-launcher alas-launcher
            .venv/bin/python -c 'import sys; print(sys.version)'
            .venv/bin/uv --version
            .venv/bin/adb version
            .venv/bin/git --version
            GIT_EXEC_PATH="$PWD/.venv/libexec/git-core" GIT_TEMPLATE_DIR="$PWD/.venv/share/git-core/templates" .venv/bin/git init git-smoke
            GIT_EXEC_PATH="$PWD/.venv/libexec/git-core" GIT_TEMPLATE_DIR="$PWD/.venv/share/git-core/templates" GIT_SSL_CAINFO=/etc/ssl/certs/ca-certificates.crt .venv/bin/git ls-remote https://github.com/git/git.git HEAD

            cd ${{ github.workspace }}
            rdfind -minsize 128 -makehardlinks true package-root/AzurLaneAutoScript
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('AP-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('package-root/AzurLaneAutoScript', arcname='AzurLaneAutoScript')
            EOF

            cp deploy.unix-cn.yaml package-root/AzurLaneAutoScript/config/deploy.yaml
            uv run python - <<EOF
            import tarfile, lzma
            with tarfile.open('AP-CN-${{ runner.os }}-$(uname -m).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('package-root/AzurLaneAutoScript', arcname='AzurLaneAutoScript')
            EOF
          windows: |
            rm -r -fo package-root -ErrorAction SilentlyContinue
            mkdir -ea 0 package-root\AzurLaneAutoScript
            cp -r AzurLaneAutoScript\deploy package-root\AzurLaneAutoScript\deploy

            cd package-root\AzurLaneAutoScript
            mkdir -ea 0 config
            mkdir -ea 0 bootstrap
            cp ..\..\deploy.windows.yaml config\deploy.yaml
            $env:UV_PYTHON_INSTALL_DIR = "$PWD\.venv\python"
            uv python install --install-dir .venv\python --no-bin --managed-python 3.14.3
            $python_home = Get-ChildItem .venv\python -Directory | Where-Object { $_.Name -like "cpython-3.14.3-*" } | Select-Object -First 1
            uv venv --allow-existing --relocatable --python "$($python_home.FullName)\python.exe" .venv
            uv pip install --python .venv\Scripts\python.exe requests
            cp ..\..\bootstrap\uv.exe .venv\Scripts\uv.exe
            cp ..\..\platform-tools\adb.exe .venv\Scripts\adb.exe
            cp ..\..\platform-tools\Adb*.dll .venv\Scripts\
            mkdir -ea 0 .venv\Scripts\git\cmd
            cp ..\..\git\cmd\git.exe .venv\Scripts\git\cmd\
            mkdir -ea 0 .venv\Scripts\git\mingw64\bin
            $git_files = @("git.exe","git-remote-http.exe","git-remote-https.exe","libcurl-4.dll") | ForEach-Object { "..\..\git\mingw64\bin\" + $_ }
            ..\..\pedeps\bin\copypedeps.exe -r $git_files .venv\Scripts\git\mingw64\bin\
            cp .venv\Scripts\adb.exe bootstrap\adb.exe
            cp .venv\Scripts\Adb*.dll bootstrap\
            mkdir -ea 0 bootstrap\git
            cp -r .venv\Scripts\git\* bootstrap\git\
            cp ..\..\target\release\alas-launcher.exe alas-launcher.exe
            .venv\Scripts\python.exe -c "import sys; print(sys.version)"
            .venv\Scripts\uv.exe --version
            .venv\Scripts\adb.exe version
            .venv\Scripts\git\cmd\git.exe --version

            cd ${{ github.workspace }}
            uv run python -c @"
            import tarfile, lzma
            with tarfile.open('AzurLaneAutoScript-${{ runner.os }}-$($env:PROCESSOR_ARCHITECTURE.ToLower()).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('package-root/AzurLaneAutoScript', arcname='AzurLaneAutoScript')
            "@

            cp deploy.windows-cn.yaml package-root\AzurLaneAutoScript\config\deploy.yaml
            uv run python -c @"
            import tarfile, lzma
            with tarfile.open('AzurLaneAutoScript-CN-${{ runner.os }}-$($env:PROCESSOR_ARCHITECTURE.ToLower()).tar.xz', 'x:xz', preset=9|lzma.PRESET_EXTREME) as t:
              t.add('package-root/AzurLaneAutoScript', arcname='AzurLaneAutoScript')
            "@
      - name: Install Inno Setup (Windows x64 only)
        if: matrix.os == 'windows-latest'
        run: choco install innosetup --no-progress -y
      - name: Build Windows installer (Windows x64 only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $candidates = @(
              "${env:ProgramFiles(x86)}\Inno Setup 7\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 7\ISCC.exe",
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
            )
            $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $iscc) {
            throw "ISCC.exe was not found after installing Inno Setup"
          }
          & $iscc install.iss `
            "/DAppVersion=$env:PACKAGE_VERSION" `
            "/DOutputBaseFilename=AzurPilot_Setup_$env:PACKAGE_VERSION" `
            "/DPackageRoot=package-root\AzurLaneAutoScript" `
            "/DSetupRoot=setup"
      - name: Prepare launcher updater payload
        uses: knicknic/os-specific-run@v1.0.3
        with:
          linux: |
            arch=$(uname -m)
            case "$arch" in
              x86_64) arch_key="x86_64" ;;
              aarch64|arm64) arch_key="aarch64" ;;
              i686|i386) arch_key="i686" ;;
              armv7l) arch_key="armv7" ;;
              *) echo "Unsupported architecture: $arch"; exit 1 ;;
            esac
            mkdir -p launcher-updater
            cp target/release/alas-launcher "launcher-updater/alas-launcher-linux-$arch_key"
          macos: |
            arch=$(uname -m)
            case "$arch" in
              x86_64) arch_key="x86_64" ;;
              aarch64|arm64) arch_key="aarch64" ;;
              *) echo "Unsupported architecture: $arch"; exit 1 ;;
            esac
            mkdir -p launcher-updater
            cp target/release/alas-launcher "launcher-updater/alas-launcher-darwin-$arch_key"
          windows: |
            $arch = $env:PROCESSOR_ARCHITECTURE.ToLower()
            if ($arch -eq "amd64") { $arch = "x86_64" }
            elseif ($arch -eq "x86") { $arch = "i686" }
            elseif ($arch -eq "arm64") { $arch = "aarch64" }
            mkdir -ea 0 launcher-updater
            cp target\release\alas-launcher.exe ("launcher-updater\\alas-launcher-windows-" + $arch + ".exe")
      - name: Upload launcher updater payload
        uses: actions/upload-artifact@v4
        with:
          name: launcher-updater-${{ matrix.os }}
          path: launcher-updater/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: |
            AzurLaneAutoScript-${{ runner.os }}-*
            AP-${{ runner.os }}-*
            AzurPilot_Setup_*.exe
      - name: Upload artifacts (CN)
        uses: actions/upload-artifact@v4
        with:
          name: package-CN-${{ matrix.os }}
          path: |
            AzurLaneAutoScript-CN-${{ runner.os }}-*
            AP-CN-${{ runner.os }}-*
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          prerelease: true
          files: |
            AzurLaneAutoScript-${{ runner.os }}-*
            AzurLaneAutoScript-CN-${{ runner.os }}-*
            AP-${{ runner.os }}-*
            AP-CN-${{ runner.os }}-*
            AzurPilot_Setup_*.exe

  deploy-launcher-update-legacy:
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    env:
      UPDATE_BASE_URL: https://alas.nanoda.work/updata
    steps:
      - name: Download launcher updater payloads
        uses: actions/download-artifact@v4
        with:
          pattern: launcher-updater-*
          merge-multiple: true
          path: launcher-updater
      - name: Build stable.json
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import datetime
          import hashlib
          import json
          import os
          from pathlib import Path

          base_url = os.environ["UPDATE_BASE_URL"].rstrip("/")
          version = os.environ["VERSION"].strip()
          if version.startswith("v"):
              version = version[1:]

          root = Path("launcher-updater")
          files = sorted(
              p for p in root.glob("alas-launcher-*")
              if p.is_file() and p.name != "stable.json"
          )
          if not files:
              raise SystemExit("No launcher payloads found in launcher-updater/")

          platforms = {}
          for file_path in files:
              name = file_path.name
              key = name[len("alas-launcher-"):]
              if key.endswith(".exe"):
                  key = key[:-4]
              url_name = name
              if name == "alas-launcher-windows-x86_64.exe":
                  url_name = "alas-launcher.exe"
              digest = hashlib.sha256(file_path.read_bytes()).hexdigest()
              platforms[key] = {
                  "url": f"{base_url}/{url_name}",
                  "sha256": digest,
              }

          manifest = {
              "version": version,
              "pub_date": datetime.datetime.now(datetime.timezone.utc).isoformat().replace("+00:00", "Z"),
              "notes": f"Launcher auto update {version}",
              "platforms": platforms,
          }
          (root / "stable.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Trust deployment host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Upload updater files to OpenResty path
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: /opt/1panel/www/sites/alas.nanoda.work/index/updata
        run: |
          set -eu
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          INCOMING="${DEPLOY_PATH}/.incoming-${GITHUB_RUN_ID}"
          UPLOAD_DIR="launcher-updater-upload"
          rm -rf "${UPLOAD_DIR}"
          mkdir -p "${UPLOAD_DIR}"
          for file in launcher-updater/alas-launcher-*; do
            [ -f "${file}" ] || continue
            filename="$(basename "${file}")"
            remote_name="${filename}"
            if [[ "${filename}" == "alas-launcher-windows-x86_64.exe" ]]; then
              remote_name="alas-launcher.exe"
            fi
            cp "${file}" "${UPLOAD_DIR}/${remote_name}"
          done
          cp launcher-updater/stable.json "${UPLOAD_DIR}/stable.json"
          ARCHIVE="launcher-updater-upload.tar.gz"
          PARTS_DIR="launcher-updater-upload-parts"
          rm -rf "${ARCHIVE}" "${PARTS_DIR}"
          tar -C "${UPLOAD_DIR}" -cf - . | gzip -1 > "${ARCHIVE}"
          mkdir -p "${PARTS_DIR}"
          split -b 4m -d -a 4 "${ARCHIVE}" "${PARTS_DIR}/part-"
          ssh -p "${DEPLOY_PORT}" "${REMOTE}" "rm -rf '${INCOMING}' && mkdir -p '${DEPLOY_PATH}' '${INCOMING}/parts' '${INCOMING}/unpack'"
          find "${PARTS_DIR}" -type f -name 'part-*' -print0 \
            | xargs -0 -P 8 -I {} sh -c 'part="$1"; scp -q -P "$2" "$part" "$3:$4/parts/$(basename "$part")"' sh "{}" "${DEPLOY_PORT}" "${REMOTE}" "${INCOMING}"
          ssh -p "${DEPLOY_PORT}" "${REMOTE}" "set -eu
            cat '${INCOMING}/parts'/part-* | gzip -d | tar -C '${INCOMING}/unpack' -xf -
          "
          ssh -p "${DEPLOY_PORT}" "${REMOTE}" "set -eu
            find '${INCOMING}/unpack' -maxdepth 1 -type f ! -name 'stable.json' -exec mv -f {} '${DEPLOY_PATH}/' \;
            mv -f '${INCOMING}/unpack/stable.json' '${DEPLOY_PATH}/stable.json'
            rm -rf '${INCOMING}'
          "

  deploy-launcher-update:
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.R2_REGION }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PREFIX: ${{ secrets.R2_PREFIX }}
      R2_REGION: ${{ secrets.R2_REGION }}
      NEW_UPDATE_URL: ${{ secrets.LAUNCHER_NEW_UPDATE_URL }}
      NEW_PAYLOAD_BASE_URL: ${{ secrets.LAUNCHER_NEW_PAYLOAD_BASE_URL }}
      NEW_MANIFEST_DEPLOY_ROOT: ${{ secrets.NEW_MANIFEST_DEPLOY_ROOT }}
    steps:
      - name: Download launcher updater payloads
        uses: actions/download-artifact@v4
        with:
          pattern: launcher-updater-*
          merge-multiple: true
          path: launcher-updater
      - name: Prepare versioned launcher updater payloads
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import hashlib
          import datetime
          import json
          import os
          import shutil
          from pathlib import Path

          version = os.environ["VERSION"].strip()
          if version.startswith("v"):
              version = version[1:]

          manifest_url = os.environ["NEW_UPDATE_URL"].rstrip("/")
          if not manifest_url.endswith("/stable.json"):
              raise SystemExit("LAUNCHER_NEW_UPDATE_URL must end with /stable.json")
          base_url = f'{os.environ["NEW_PAYLOAD_BASE_URL"].rstrip("/")}/{version}'
          source_root = Path("launcher-updater")
          target_root = Path("launcher-updater-r2")
          if target_root.exists():
              shutil.rmtree(target_root)
          target_root.mkdir(parents=True, exist_ok=True)

          files = sorted(
              p for p in source_root.glob("alas-launcher-*")
              if p.is_file() and p.name != "stable.json"
          )
          if not files:
              raise SystemExit("No launcher payloads found in launcher-updater/")

          def versioned_name(name: str) -> str:
              if name.endswith(".exe"):
                  return f"{name[:-4]}-{version}.exe"
              return f"{name}-{version}"

          platforms = {}
          for file_path in files:
              name = file_path.name
              key = name[len("alas-launcher-"):]
              if key.endswith(".exe"):
                  key = key[:-4]
              dest_name = versioned_name(name)
              dest_path = target_root / dest_name
              shutil.copy2(file_path, dest_path)
              digest = hashlib.sha256(dest_path.read_bytes()).hexdigest()
              platforms[key] = {
                  "url": f"{base_url}/{dest_name}",
                  "sha256": digest,
              }

          manifest = {
              "version": version,
              "pub_date": datetime.datetime.now(datetime.timezone.utc).isoformat().replace("+00:00", "Z"),
              "notes": f"Launcher auto update {version}",
              "platforms": platforms,
          }
          (target_root / "stable.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(f"Publishing mTLS manifest to {manifest_url}")
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY
      - name: Upload versioned payloads to R2
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          root="launcher-updater-r2"
          for file in "${root}"/alas-launcher-*; do
            [ -f "${file}" ] || continue
            name="$(basename "${file}")"
            aws s3 cp "${file}" "s3://${R2_BUCKET}/${R2_PREFIX}/${version}/${name}" \
              --endpoint-url "${R2_ENDPOINT}" \
              --region "${R2_REGION}" \
              --cache-control "public, max-age=31536000, immutable" \
              --only-show-errors
          done
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Trust deployment host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Upload new manifest to OpenResty path
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.NEW_MANIFEST_DEPLOY_ROOT }}/updata
        run: |
          set -eu
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -p "${DEPLOY_PORT}" "${REMOTE}" "sudo -n mkdir -p '${DEPLOY_PATH}' && sudo -n chown '${DEPLOY_USER}' '${DEPLOY_PATH}'"
          scp -q -P "${DEPLOY_PORT}" launcher-updater-r2/stable.json "${REMOTE}:${DEPLOY_PATH}/stable.json"
      - name: Delete superseded R2 payload versions
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          r2_prefix="${R2_PREFIX%/}"
          current_prefix="${r2_prefix}/${version}/"
          version_prefixes="$(
            aws s3api list-objects-v2 \
              --bucket "${R2_BUCKET}" \
              --prefix "${r2_prefix}/" \
              --delimiter "/" \
              --endpoint-url "${R2_ENDPOINT}" \
              --region "${R2_REGION}" \
              --query 'CommonPrefixes[].Prefix' \
              --output text
          )"
          [ -n "${version_prefixes}" ] || exit 0
          printf '%s\n' "${version_prefixes}" | tr '\t' '\n' | while IFS= read -r version_prefix; do
            [ -n "${version_prefix}" ] || continue
            [ "${version_prefix}" = "None" ] && continue
            [ "${version_prefix}" = "${current_prefix}" ] && continue
            case "${version_prefix}" in
              "${r2_prefix}/"*/) ;;
              *) echo "Refusing to delete unexpected R2 prefix: ${version_prefix}" >&2; exit 1 ;;
            esac
            aws s3 rm "s3://${R2_BUCKET}/${version_prefix}" \
              --recursive \
              --endpoint-url "${R2_ENDPOINT}" \
              --region "${R2_REGION}" \
              --only-show-errors
          done
