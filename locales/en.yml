tips:
  0: "Commander, let's do our best again today!"
  1: "Did you know giving a ring to your ship girl makes her stronger?"
  2: "Don't forget to collect daily rewards — every little bit counts."
  3: "Remember to refill the food in the dorm, or your ship girls will go hungry."
  4: "Research may be slow, but it's the path to becoming stronger."
  5: "Don't forget your daily free construction (even if it's mostly fodder)."
  6: "AzurPilot is working hard for you, please wait a moment."
  7: "Attempting to infiltrate the Siren stronghold..."
  8: "Refueling, please wait, Commander..."
  9: "Trying to convince the Manjuus to speed up..."
  10: "Taking a proper break is part of a Commander's job too."
  11: "Did you know tapping the secretary girl has a surprise?"
  12: "The compensation cubes and resources from maintenance... haven't arrived yet, wait a bit more."
  13: "Intercepting Siren jamming signals..."
  14: "Analyzing Siren technology matrix..."
  15: "The Royal Navy's tea is ready. Would you like a cup, Commander?"
  16: "Eagle Union's party is all set, just waiting for you, Commander."
  17: "Sakura Empire's cherry blossoms have fallen, but our fight has just begun."
  18: "Iron Blood's technology is the best in the world!"
